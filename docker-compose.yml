version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: supplychainx_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: supplychainx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: supplychainx_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  ai-service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: supplychainx_ai
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    depends_on:
      - db
      - redis

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supplychainx_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/supplychainx?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=super-secret-key-change-in-production
      - AI_SERVICE_URL=http://ai-service:8000
      - PORT=5000
    depends_on:
      - db
      - redis
      - ai-service

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: supplychainx_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000/api
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
